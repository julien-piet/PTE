# Evaluation

# Synthetic requests
eval_prompts:
  # scope coverage benchmark
  single_app_multi_methods: data/evaluation/single_app_multi_methods/{APP1}.json
  single_app_single_methods: data/evaluation/single_app_single_methods/{APP1}.json
  multi_app_multi_methods: data/evaluation/multi_app_multi_methods/{APP1}.json # misleading name, APP is actually a suite defined in suite_dict
  # end-to-end benchmark
  real_accounts_single: data/evaluation/real_accounts_single/{PROVIDER}/{MODEL}/{APP1}.json
  real_accounts_multiple: data/evaluation/real_accounts_multiple/{PROVIDER}/{MODEL}/{APP1}.json
  real_accounts_cross_app: data/evaluation/real_accounts_multiple/{PROVIDER}/{MODEL}/{APP1}_{APP2}.json



# llm
llm_solution:
  single_app_multi_methods: data/results/{PROVIDER}/{MODEL}/{APP1}/{APP1}_llm_single_app_multi_methods_solutions.json
  single_app_single_methods: data/results/{PROVIDER}/{MODEL}/{APP1}/{APP1}_llm_single_app_single_methods_solutions.json
  multi_app_multi_methods: data/results/{PROVIDER}/{MODEL}/{APP1}/{APP1}_llm_multi_app_multi_methods_solutions.json

miniscope_solution:
  single_app_multi_methods: data/results/miniscope/{APP1}/{APP1}_miniscope_single_app_multi_methods_solutions.json
  single_app_single_methods: data/results/miniscope/{APP1}/{APP1}_miniscope_single_app_single_methods_solutions.json
  multi_app_multi_methods:  data/results/miniscope/{APP1}/{APP1}_miniscope_multi_app_multi_methods_solutions.json

test_accounts:
  gmail:
    - name: <name1>
      email: <email1>

    - name: <name2>
      email: <email2>

  gdrive:
    - name: <name1>
      email: <email1>

    - name: <name2>
      email: <email2>

  slack:
     - name: <name1>
       email: <email1>
       user_id: <user_id1>

     - name: <name2>
       email: <email2>
       user_id: <user_id2>

  slack_gmail:
     - example: list Slack channels → create a Gmail draft summarizing them
