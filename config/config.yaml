# assume all env config files under project_root/config directory
client_env_path: config/.env
mcp_env_path: config/.mcpenv
shared_env_path: config/.sharedenv

mcp_server:
#  slack: http://localhost:8000/mcpslack
#  google_mail: http://localhost:8001/mcpgmail
#  weather: http://localhost:8002/mcpweather
#  gdrive: http://localhost:8003/mcpgdrive
   webarena: http://localhost:8000/

agent_llm_provider: openai
agent_llm_model: gpt-4.1

llm_access_retry: 3

llm_providers:
 openai:
  - model: gpt-5
    temp: 1.0

  - model: gpt-5-mini
    temp: 1.0

  - model: gpt-5-nano
    temp: 1.0

  - model: gpt-4.1
    temp: 0.0

  - model: gpt-4o
    temp: 1.0

  - model: o3
    temp: 1.0

  - model: o3-mini
    temp: 1.0

  - model: o4-mini
    temp: 1.0

 anthropic:
  - model: claude-3-7-sonnet-20250219
    temp: 1.0

  - model: claude-opus-4-1-20250805
    temp: 1.0

  - model: claude-sonnet-4-0
    temp: 1.0

  - model: claude-sonnet-3-7
    temp: 1.0

 google:
  - model: gemini-1.5-flash
    temp: 1.0
  - model: gemini-1.5-pro
    temp: 1.0
  - model: gemini-1.0-pro
    temp: 1.0
  - model: text-bison
    temp: 1.0
  - model: chat-bison
    temp: 1.0
  - model: gemini-2.5-flash
    temp: 1.0
  - model: gemini-2.5-flash-lite
    temp: 1.0

